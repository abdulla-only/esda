# Development stack for esda.
#
# Brought up with `make dev` (which loads .env.development). All application
# config comes from that env file; this file only wires services together.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esda}
      POSTGRES_DB: ${POSTGRES_DB:-esda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esda} -d ${POSTGRES_DB:-esda}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    env_file:
      - .env.development
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    # entrypoint.sh waits for the DB and auto-migrates, then runs this command.
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./api:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build:
      context: ./bot
    env_file:
      - .env.development
    volumes:
      - ./bot:/app
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./web
      target: dev
    env_file:
      - .env.development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
